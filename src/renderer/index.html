<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com; connect-src http://127.0.0.1:11434;">
    <title>Imposter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components/chat.css">
    <link rel="stylesheet" href="css/components/input.css">
    <link rel="stylesheet" href="css/components/modal.css">
    <link rel="stylesheet" href="css/components/onboarding.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="model-selector-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="selector-icon"><path d="M12 2L2 7L12 12L22 7L12 2Z"></path><path d="M2 17L12 22L22 17"></path><path d="M2 12L12 17L22 12"></path></svg>
                <select id="modelSelect">
                    <option value="">Loading models...</option>
                </select>
            </div>
            <div class="status-indicator">
                <span id="connectionStatus" class="dot offline"></span>
                <span id="statusText">Checking...</span>
                <button id="settings-btn" class="icon-button" title="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </header>

        <main class="chat-stage" id="chat-stage">
            <div id="result-content" class="markdown-body">
                <div class="empty-state">
                    <img src="../../public/logo.png" class="brand-logo" alt="Logo">
                    <h2>Imposter</h2>
                    <p id="tagline-text">Beating a Broken System</p>
                    <div id="greeting-container"></div>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="prompt-input" rows="1" placeholder="Ask anything..."></textarea>
                <div class="input-actions">
                    <span class="shortcut-hint">Ctrl+Shift+Enter to send</span>
                    <button id="search-btn" class="send-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-white"><path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
            </div>
        </footer>

        <div id="onboarding-overlay" class="overlay hidden">
            <div class="onboarding-card">
                <h2>Welcome to Imposter</h2>
                <p>Private identity setup. Stored locally.</p>
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="user-name" placeholder="e.g. Adams">
                </div>
                <div class="form-group">
                    <label>Systematic Override</label>
                    <textarea id="system-prompt" rows="3" placeholder="e.g. Be concise and professional."></textarea>
                </div>
                <button id="save-config-btn" class="primary-btn">Initialize</button>
            </div>
        </div>

        <div id="settings-overlay" class="overlay hidden">
            <div class="settings-modal">
                <div class="settings-sidebar">
                    <div class="sidebar-header">Imposter Settings</div>
                    <div class="sidebar-tabs">
                        <button class="tab-btn active" data-tab="profile">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            Profile
                        </button>
                        <button class="tab-btn" data-tab="ai-config">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
                            AI Engine
                        </button>
                    </div>
                </div>
                <div class="settings-content">
                    <div id="tab-profile" class="tab-pane active">
                        <h2>Personal Identity</h2>
                        <div class="field-group">
                            <label>Display Name</label>
                            <input type="text" id="settings-name">
                            <p class="field-hint">Used for home greetings.</p>
                        </div>
                    </div>
                    <div id="tab-ai-config" class="tab-pane">
                        <h2>AI Intelligence</h2>
                        <div class="field-group">
                            <label>Systematic Override</label>
                            <textarea id="settings-prompt" rows="5"></textarea>
                            <p class="field-hint">Global instructions for every query.</p>
                        </div>
                    </div>
                    <div class="settings-footer">
                        <button id="close-settings" class="secondary-btn">Cancel</button>
                        <button id="save-settings" class="primary-btn">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
