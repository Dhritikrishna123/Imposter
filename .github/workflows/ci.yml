name: Imposter CI/CD

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

jobs:
  # --- CHECK STAGE: Runs on EVERY branch push and EVERY Pull Request ---
  # Ensures that no matter what you're working on, the code still builds.
  check:
    name: Build Check
    if: github.event_name == 'pull_request' || (!startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Check (Dry Run)
        run: pnpm run dist -- --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- RELEASE STAGE: Only runs for version tags (v*) ---
  release:
    name: Production Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build & Publish Release
        run: pnpm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
