name: Imposter Build Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # --- CHECK STAGE: Runs on EVERY branch push and EVERY Pull Request ---
  # Ensures that no matter what you're working on, the code still builds.
  check:
    name: Build Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Check (Dry Run)
        run: pnpm run dist -- --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
